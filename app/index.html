<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Knowledge Game</title>
<meta name="description" content="A community feed reader for the EpiStack protocol: typed claims, graded on device.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-any-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<a class="skip-link" href="#feed">Skip to feed</a>
<header class="app-header" id="app-header">
  <div class="header-row">
    <img class="app-mark" src="icons/icon-any-192.png" alt="" width="24" height="24">
    <span class="active-community-name" id="active-community-name"></span>
    <div class="sync-state" id="sync-state" aria-live="polite"></div>
  </div>
  <div class="indicator-chips" id="indicator-chips" aria-label="Governance indicators"></div>
</header>
<div id="virtual-lens-mount"></div>
<main id="feed" class="feed" aria-live="polite" aria-busy="true">
  <p class="feed-status" id="feed-status">Loading the feed...</p>
</main>
<footer class="app-footer">
  <p>Grades are computed on device from the public graph. A grade is a computed reading, never a claim of truth.</p>
</footer>
<nav class="bottom-nav" id="bottom-nav" aria-label="Main navigation">
  <button type="button" class="bottom-nav-button" data-nav="feed" aria-label="Feed">Feed</button>
  <button type="button" class="bottom-nav-button" data-nav="communities" aria-label="Communities">Communities</button>
  <button type="button" class="bottom-nav-button" data-nav="compose" aria-label="Compose">Compose</button>
  <button type="button" class="bottom-nav-button" data-nav="menu" aria-label="Menu">Menu<span class="menu-unread-dot" id="menu-unread-dot" hidden></span></button>
</nav>
<script type="module" src="../periphery/app.js"></script>
</body>
</html>
