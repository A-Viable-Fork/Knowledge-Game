name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: check-substrate
        run: node build/check-substrate.mjs
      - name: check-stages
        run: node build/check-stages.mjs
      - name: check-knowledge-game
        run: node build/check-knowledge-game.mjs
      - name: check-entrance-listing
        run: node build/check-entrance-listing.mjs
      - name: check-imports
        run: node build/check-imports.mjs
      - name: check-egress
        run: node build/check-egress.mjs
      - name: check-conformance-read
        run: node build/check-conformance-read.mjs
      - name: check-feed-determinism
        run: node build/check-feed-determinism.mjs
      - name: check-ranking-separation
        run: node build/check-ranking-separation.mjs
      - name: check-objective
        run: node build/check-objective.mjs
      - name: check-vault
        run: node build/check-vault.mjs
      - name: check-provider-contract
        run: node build/check-provider-contract.mjs
      - name: check-offline-shell
        run: node build/check-offline-shell.mjs
      - name: check-epistack-competition
        run: node build/check-epistack-competition.mjs
      - name: check-conformance-write
        run: node build/check-conformance-write.mjs
      - name: check-neutrality
        run: node build/check-neutrality.mjs
      - name: check-profile-leak
        run: node build/check-profile-leak.mjs
      - name: check-citation
        run: node build/check-citation.mjs
      - name: check-ladder
        run: node build/check-ladder.mjs
      - name: check-seams
        run: node build/check-seams.mjs
      - name: check-filter
        run: node build/check-filter.mjs
      - name: check-discussion
        run: node build/check-discussion.mjs
      - name: check-extension-seam
        run: node build/check-extension-seam.mjs
      - name: check-skins
        run: node build/check-skins.mjs
      - name: check-assistant
        run: node build/check-assistant.mjs
      - name: check-designer
        run: node build/check-designer.mjs
      - name: check-gate-feedback
        run: node build/check-gate-feedback.mjs
      - name: check-card-hashes
        run: node build/check-card-hashes.mjs
      - name: check-references
        run: node build/check-references.mjs
      - name: check-parameter-surface
        run: node build/check-parameter-surface.mjs
      - name: check-virtual-isolation
        run: node build/check-virtual-isolation.mjs
      - name: check-outbox
        run: node build/check-outbox.mjs
      - name: check-sync-policy
        run: node build/check-sync-policy.mjs
      - name: check-submission-surface
        run: node build/check-submission-surface.mjs
      - name: check-the-registry
        run: node build/check-the-registry.mjs
      - name: check-registry
        run: node build/check-registry.mjs
      - name: check-accounts
        run: node build/check-accounts.mjs
      - name: check-rooms
        run: node build/check-rooms.mjs
      - name: check-inbound-gate
        run: node build/check-inbound-gate.mjs
      - name: check-release
        run: node build/check-release.mjs
      - name: the founded community's own self-check (self-contained, no reference back into this repository)
        run: cd communities/epistack-competition && node build/check.mjs
      - name: the founded registry's own self-check (self-contained, no reference back into this repository)
        run: cd communities/the-registry && node build/check.mjs
      - name: fixtures are reproducible (regenerate and diff)
        run: |
          node build/emit-fixtures.mjs
          git diff --exit-code app/fixtures
      - name: room snapshots and cards are reproducible (regenerate and diff)
        run: |
          node build/emit-rooms.mjs
          git diff --exit-code app/fixtures communities/rooms
      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
